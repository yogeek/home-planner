name: Déploiement Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer les dépendances
        run: |
          npm ci
          cd app && npm ci

      - name: Tests
        run: npm test

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: Déployer le Worker
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::Secret CLOUDFLARE_API_TOKEN absent : déploiement sauté (build et tests OK)."
            exit 0
          fi
          npx wrangler deploy
          npx wrangler d1 migrations apply village-db --remote
